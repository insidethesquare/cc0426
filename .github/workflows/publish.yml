name: Publish Codey data to npm

# Triggers whenever content files change on main.
# The paths filter avoids publishing for README-only tweaks or meta changes.
on:
  push:
    branches: [main]
    paths:
      - 'blocks/**'
      - 'globals/**'
      - 'collections/**'
      - 'sections/**'
      - 'info/**'
      - 'glossary.md'
      - 'standard-page.md'
      - 'package.json'
  workflow_dispatch: {}  # Lets you trigger manually from the Actions tab

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to push the version bump back to main

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Fetch full history so the commit-back step can push cleanly
          fetch-depth: 0
          # Use the default GITHUB_TOKEN for the push
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Bump patch version
        id: bump
        run: |
          # Bump version without creating a git tag, commit happens manually below
          npm version patch --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Bumped to $NEW_VERSION"

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit version bump back to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          # [skip ci] prevents this commit from re-triggering the workflow
          git commit -m "chore: bump to v${{ steps.bump.outputs.new_version }} [skip ci]"
          git push
